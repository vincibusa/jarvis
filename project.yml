name: Jarvis
options:
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: com.jarvis
  developmentLanguage: it

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: 1  # iPhone only
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main

targets:
  Jarvis:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Jarvis
    resources:
      - path: Jarvis/Resources
        type: folder
    info:
      path: Jarvis/Resources/Info.plist
      properties:
        CFBundleDisplayName: Jarvis
        NSMicrophoneUsageDescription: Jarvis usa il microfono per i comandi vocali
        NSSpeechRecognitionUsageDescription: Jarvis usa il riconoscimento vocale on-device
        NSCalendarsFullAccessUsageDescription: Jarvis gestisce gli eventi del calendario
        NSRemindersFullAccessUsageDescription: Jarvis crea e legge i promemoria
        NSLocationWhenInUseUsageDescription: Jarvis usa la posizione per risposte contestuali
        NSCameraUsageDescription: Jarvis analizza le foto che scatti
        NSPhotoLibraryUsageDescription: Jarvis analizza le immagini dalla libreria
        NSSiriUsageDescription: Jarvis usa Siri per rispondere alle tue domande con AI on-device
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: Jarvis/Resources/Jarvis.entitlements
      properties:
        com.apple.developer.siri: true
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXEmbedders
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jarvis.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
